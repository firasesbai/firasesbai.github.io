<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    <!-- Skip to main content link for keyboard accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    {%- include header.html -%}

    <main id="main-content" class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <!-- MailerLite Universal (deferred - non-critical) -->
    {% if jekyll.environment == "production" %}
    <script>
      (function(w,d,e,u,f,l,n){w[f]=w[f]||function(){(w[f].q=w[f].q||[])
      .push(arguments);},l=d.createElement(e),l.async=1,l.src=u,
      n=d.getElementsByTagName(e)[0],n.parentNode.insertBefore(l,n);})
      (window,document,'script','https://assets.mailerlite.com/js/universal.js','ml');
      ml('account', '1240462');
    </script>
    {% endif %}

    <!-- Cookie Consent Logic (deferred - non-critical) -->
    <script src="https://cdn.jsdelivr.net/npm/cookieconsent@3/build/cookieconsent.min.js" data-cfasync="false" defer></script>
    <script src="/js/cookie-consent-script.js" type="text/javascript" defer></script>

  </body>

</html>
