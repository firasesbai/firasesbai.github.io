<div class="tldr-section">
  <button id="tldr-button" class="tldr-button" aria-label="Generate TL;DR summary">
    <span class="tldr-icon">⚡</span>
    <span class="tldr-label">TL;DR</span>
  </button>
  
  <!-- Loading state (hidden by default) -->
  <div id="tldr-loading" class="tldr-loading" style="display: none;">
    <p>Generating summary...</p>
  </div>
  
  <!-- Error state (hidden by default) -->
  <div id="tldr-error" class="tldr-error" style="display: none;">
    <p>Unable to generate summary. Please try again later.</p>
  </div>
  
  <!-- Result (hidden by default) -->
  <div id="tldr-result" style="display: none;">
    <p id="tldr-content" class="tldr-content"></p>
  </div>
</div>

<script>
(function() {
  'use strict';

  const isDevelopment = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
  const API_URL = isDevelopment
    ? 'http://localhost:8080/api/v1/tldr'
    : 'https://api.firasesbai.com/api/v1/tldr';
  const TIMEOUT_MS = 60000; // 60s — Gemini + content fetch + possible cold start
  const CACHE_TTL = 30 * 24 * 60 * 60 * 1000; // 30 days

  const currentUrl = '{{ site.url }}{{ page.url }}';
  const cacheKey = `tldr_${currentUrl}`;

  const button = document.getElementById('tldr-button');
  const loadingEl = document.getElementById('tldr-loading');
  const errorEl = document.getElementById('tldr-error');
  const resultEl = document.getElementById('tldr-result');
  const contentEl = document.getElementById('tldr-content');

  // Check cache on load — if we have a cached TL;DR, show it directly
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const { tldr, timestamp } = JSON.parse(cached);
      if (Date.now() - timestamp < CACHE_TTL) {
        showResult(tldr);
        return; // Already have it, show directly
      }
    }
  } catch (e) {
    // Ignore cache errors
  }

  button.addEventListener('click', handleClick);

  async function handleClick() {
    // Disable button and show loading
    button.style.display = 'none';
    loadingEl.style.display = 'block';
    errorEl.style.display = 'none';

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: currentUrl }),
        signal: controller.signal
      });

      clearTimeout(timeoutId);

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();

      if (data.tldr) {
        showResult(data.tldr);

        // Cache the result
        try {
          localStorage.setItem(cacheKey, JSON.stringify({
            tldr: data.tldr,
            timestamp: Date.now()
          }));
        } catch (e) {
          // Ignore cache write errors
        }
      } else {
        showError();
      }

    } catch (error) {
      clearTimeout(timeoutId);
      console.error('TL;DR generation failed:', error);
      showError();
    }
  }

  function showResult(tldr) {
    button.style.display = 'none';
    loadingEl.style.display = 'none';
    errorEl.style.display = 'none';
    contentEl.textContent = tldr;
    resultEl.style.display = 'block';
  }

  function showError() {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    // Show button again so user can retry
    button.style.display = 'inline-flex';
  }
})();
</script>
